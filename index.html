<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reacción F1</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* Tamaño del logo */
:root {
  --logo-size: 140px;
}

/* General */
body {
  font-family: 'Orbitron', sans-serif;
  background: #000;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
  margin:0;
  user-select: none;
  position: relative;
  overflow: auto;
  min-height: 100vh;
}

/* Fondo */
#fondo {
  position: absolute; 
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

/* Hexágonos */
.hex {
  position: absolute;
  width: 40px;
  height: 40px;
  background: linear-gradient(45deg, #8a2be2, #ff69b4, #ffff00);
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  opacity: 0.05;
  animation: flotar linear infinite;
}

@keyframes flotar {
  0% { transform: translateY(0); }
  100% { transform: translateY(-60px); }
}

/* Logo */
#logo {
  position: fixed;
  top: 10px;
  left: 10px;
  width: var(--logo-size);
  z-index: 10;
}

/* Título */
h1 {
  font-size: 2rem;
  background: linear-gradient(45deg, #8a2be2, #ff69b4, #ffff00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* INPUT NOMBRE */
#nombreJugador{
  margin-bottom:10px;
  padding:8px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* Semáforo */
.semaforo {
  width: 120px;
  background: #222;
  border-radius: 25px;
  padding: 25px;
  border: 4px solid #8a2be2;
}

.luz {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #111;
  margin: 15px auto;
}

.luz.encendida {
  box-shadow: 0 0 25px 8px currentColor;
}

/* Info */
.info {
  font-size: 1.5rem;
  background: linear-gradient(45deg, #8a2be2, #ff69b4, #ffff00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.invalido { color: red; }

/* Botones */
.botonera {
  display: flex;
  gap: 10px;
}

button {
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #8a2be2, #ff69b4, #ffff00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Historial */
.historial {
  margin-top: 20px;
  text-align: center;
}

/* TABLA */
#tablaRanking {
  width: 250px;
  border-collapse: collapse;
  margin-top: 10px;
}

#tablaRanking th {
  font-size: 0.9rem;
}

#tablaRanking td {
  font-size: 0.85rem;
  padding: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

</style>
</head>
<body>

<div id="fondo"></div>

<img src="onix_logo2.png" id="logo">

<h1>Prueba de Reacción F1</h1>

<input id="nombreJugador" placeholder="Tu nombre">

<div class="semaforo">
  <div id="rojo" class="luz" style="color:red;"></div>
  <div id="amarillo" class="luz" style="color:yellow;"></div>
  <div id="verde" class="luz" style="color:green;"></div>
</div>

<div class="info">
  <p id="instruccion">Presione "Iniciar" para comenzar.</p>
</div>

<div class="botonera">
  <button id="btnIniciar">Iniciar</button>
  <button id="btnFinalizar">Finalizar Tiempo</button>
  <button id="btnReintentar" style="display:none;">Reintentar</button>
</div>

<div class="historial">
  <h3>Último tiempo: <span id="ultimo">-</span></h3>
  <h3>Mejor tiempo: <span id="mejor">-</span></h3>

  <h3>🏁 Ranking Global</h3>
  <table id="tablaRanking">
    <thead>
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Tiempo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHSNdY_R6cvdzL9rMnfBDdbgyoW3F4NZE",
  authDomain: "onix-reaction-87740.firebaseapp.com",
  projectId: "onix-reaction-87740",
  storageBucket: "onix-reaction-87740.firebasestorage.app",
  messagingSenderId: "23997394829",
  appId: "1:23997394829:web:a05ecad9aa646f58f257c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// HEXÁGONOS
const fondo = document.getElementById("fondo");
for(let i=0;i<20;i++){
  const hex = document.createElement("div");
  hex.classList.add("hex");
  hex.style.top = Math.random()*100+"%";
  hex.style.left = Math.random()*100+"%";
  fondo.appendChild(hex);
}

// SEMÁFORO
const luces = ["rojo","amarillo","verde"];
const btnFinalizar = document.getElementById("btnFinalizar");
const btnIniciar = document.getElementById("btnIniciar");
const btnReintentar = document.getElementById("btnReintentar");
const ultimo = document.getElementById("ultimo");
const mejor = document.getElementById("mejor");
const instruccion = document.getElementById("instruccion");

let historial = [];
let tiempoInicio = null;
let pruebaActiva = false;

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function secuenciaLuces(){
  pruebaActiva=false;
  for(let i=0;i<luces.length;i++){
    prenderLuz(luces[i]);
    if(i>0) apagarLuz(luces[i-1]);
    await sleep(1000);
  }
  await sleep(Math.random()*2000+1000);
  apagarTodasLuces();
  tiempoInicio = new Date();
  pruebaActiva = true;
}

function prenderLuz(id){
  const luz=document.getElementById(id);
  luz.style.background=luz.style.color;
  luz.classList.add("encendida");
}
function apagarLuz(id){
  const luz=document.getElementById(id);
  luz.style.background="#111";
  luz.classList.remove("encendida");
}
function apagarTodasLuces(){ luces.forEach(apagarLuz); }

async function registrarTiempo(){
  if(!pruebaActiva){
    instruccion.innerHTML='<span class="invalido">¡Tiempo inválido!</span>';
    return;
  }

  const t=((new Date()-tiempoInicio)/1000).toFixed(3);
  const nombre = document.getElementById("nombreJugador").value || "Anónimo";

  if(parseFloat(t) > 0){
    historial.push(parseFloat(t));
    ultimo.textContent=t;
    mejor.textContent=Math.min(...historial).toFixed(3);

    // 🔥 SOLO MEJOR TIEMPO
    const jugadoresRef = collection(db, "leaderboard");
    const snapshot = await getDocs(jugadoresRef);

    let existe = false;

    for (const documento of snapshot.docs) {
      const data = documento.data();

      if (data.nombre === nombre) {
        existe = true;

        if (parseFloat(t) < data.tiempo) {
          await setDoc(doc(db, "leaderboard", documento.id), {
            nombre: nombre,
            tiempo: parseFloat(t)
          });
        }

        break;
      }
    }

    if (!existe) {
      await addDoc(collection(db,"leaderboard"),{
        nombre: nombre,
        tiempo: parseFloat(t)
      });
    }
  }

  pruebaActiva=false;
  btnReintentar.style.display="inline-block";
}

btnFinalizar.onclick=registrarTiempo;
document.addEventListener("keydown",e=>{ if(e.code==="Space") registrarTiempo(); });

btnIniciar.onclick=()=>{
  btnIniciar.style.display="none";
  btnReintentar.style.display="none";
  secuenciaLuces();
};

btnReintentar.onclick=()=>{
  btnReintentar.style.display="none";
  secuenciaLuces();
};

// RANKING EN VIVO
const tablaBody = document.querySelector("#tablaRanking tbody");

const q = query(
  collection(db,"leaderboard"),
  orderBy("tiempo"),
  limit(11)
);

onSnapshot(q,(snapshot)=>{
  tablaBody.innerHTML="";
  let pos=1;

  snapshot.forEach(doc=>{
    const data=doc.data();
    if(data.tiempo <= 0) return;

    tablaBody.innerHTML += `
      <tr>
        <td>${pos}</td>
        <td>${data.nombre || "Anon"}</td>
        <td>${data.tiempo.toFixed(3)}</td>
      </tr>
    `;
    pos++;
  });
});

</script>

</body>
</html>
